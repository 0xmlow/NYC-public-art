name: Refresh artworks dataset

# Runs every Monday at 07:00 UTC, and can be triggered manually from the Actions tab.
on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: write  # needed to push the refreshed dataset back

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyproj openpyxl requests certifi

      - name: Rebuild dataset from NYC Open Data sources
        run: python scripts/build_dataset.py

      - name: Rebuild NYC mask
        run: python scripts/build_mask.py

      - name: Enrich with Wikipedia / Commons images
        run: python scripts/enrich_images.py

      - name: Commit & push if changed
        run: |
          git config user.name "painted-city-bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/data/artworks.json public/data/painted_city_dataset.xlsx public/data/nyc_mask.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            DATE=$(date -u +"%Y-%m-%d")
            git commit -m "chore(data): weekly refresh ${DATE}"
            git push
          fi
